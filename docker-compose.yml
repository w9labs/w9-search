version: '3.7'

services:
  w9-search:
    build:
      context: .
      dockerfile: Dockerfile.build
    restart: unless-stopped
    ports:
      - "${PORT:-3005}:${PORT:-3005}"
    environment:
      - PORT=${PORT:-3005}
      - DATABASE_URL=sqlite:/app/data/w9_search.db
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-https://searxng.w9.nu}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - w9-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  searxng:
    profiles:
      - local-search
    image: searxng/searxng:latest
    restart: always
    networks:
      - w9-network
      - traefik
    expose:
      - "8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - BASE_URL=${SEARXNG_BASE_URL:-https://searxng.w9.nu/}
      - INSTANCE_NAME=w9-searxng
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.searxng.entrypoints=websecure"
      - "traefik.http.routers.searxng.tls=true"
      # Supports multiple domains via Traefik rule, e.g.
      # SEARXNG_TRAEFIK_RULE=Host(`search.example.com`) || Host(`search2.example.com`)
      - "traefik.http.routers.searxng.rule=${SEARXNG_TRAEFIK_RULE:-Host(`search.example.com`)}"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"

networks:
  w9-network:
    name: w9-network
    driver: bridge
  traefik:
    external: true
